name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    # A whole leg runs well under 5 min (pip install ~1-2 min, pytest ~45s, ruff/mypy
    # seconds), so 15 gives ~3x headroom for a slow PyPI day while being 24x tighter
    # than GitHub's 360-minute default. Raise it if a leg ever legitimately outgrows it;
    # do not remove it — an unbounded hang burns 6 hours across all three legs.
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v5
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -c constraints.txt -e ".[dev,workflows,reasoning,agents,monitor,harness]"
    - name: Audit for suspicious .pth files
      run: |
        python scripts/audit_pth.py
    - name: Lint with ruff
      run: |
        ruff check src/ tests/
    - name: Check formatting with ruff
      # Developers run `make format`; without this step CI could not see drift.
      run: |
        ruff format --check src/ tests/
    - name: Type check with mypy
      run: |
        mypy src/fsm_llm/ src/fsm_llm_reasoning/ src/fsm_llm_workflows/ src/fsm_llm_agents/ src/fsm_llm_monitor/ src/fsm_llm_harness/ --ignore-missing-imports
    - name: Test with pytest
      # Marker exclusions are deliberate — do NOT "restore" a bare `pytest tests/`:
      #   not slow        -> 31 tests that deliberately time.sleep() to exercise
      #                      timeout code paths; excluded for CI speed, not safety.
      #   not real_llm    -> the 12 tests in tests/test_integration_ollama.py, which
      #   not integration    need a live ollama on localhost:11434 (absent in CI, so
      #                      they self-skip; excluded explicitly for intent).
      # `examples` and tests/test_fsm_llm_meta/ are intentionally KEPT here even
      # though the local dev gate drops them: they are fast and offline-safe in CI
      # (43 structural JSON tests, 208 meta tests, every LLM call already guarded),
      # so CI gets MORE coverage than the local gate, not less.
      # The deselect keeps this command one axis away from the documented local gate;
      # that test only hangs on a dev box with a live ollama. See plans decisions.md
      # D-003 and plans/plan-2026-07-19T124525-9899fbac/findings/ci-pytest-step.md.
      run: |
        python -m pytest tests/ -q -m "not slow and not real_llm and not integration" --deselect "tests/test_fsm_llm_agents/test_reasoning_react.py::TestReasoningReactAgentHandlerReset::test_repeated_run_resets_iteration_counter"
