name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,workflows]"
    - name: Lint with ruff
      run: |
        ruff check src/ tests/
    - name: Type check with mypy
      continue-on-error: true  # TODO: fix 118 pre-existing mypy errors then remove this
      run: |
        mypy src/fsm_llm/ src/fsm_llm_reasoning/ src/fsm_llm_workflows/ src/fsm_llm_classification/ --ignore-missing-imports
    - name: Test with pytest
      run: |
        python -m pytest tests/ -v
