[tox]
envlist = py310, py311, py312
isolated_build = True

[testenv]
extras = dev,workflows,classification,reasoning
deps =
    pytest
    pytest-cov
commands =
    pytest {posargs:tests} --cov=fsm_llm

[testenv:lint]
deps =
    ruff
commands =
    ruff check src tests

[testenv:type]
extras = dev,workflows,classification,reasoning
deps =
    mypy
commands =
    mypy src/fsm_llm/ src/fsm_llm_reasoning/ src/fsm_llm_workflows/ src/fsm_llm_classification/ --ignore-missing-imports
