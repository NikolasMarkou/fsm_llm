[tox]
envlist = py310, py311, py312
isolated_build = True

[testenv]
extras = dev,workflows,classification,reasoning,agents,monitor
install_command = pip install -c {toxinidir}/constraints.txt {opts} {packages}
commands =
    pytest {posargs:tests} --cov=fsm_llm --cov=fsm_llm_classification --cov=fsm_llm_reasoning --cov=fsm_llm_workflows --cov=fsm_llm_agents --cov=fsm_llm_monitor

[testenv:lint]
extras = dev
commands =
    ruff check src tests

[testenv:type]
extras = dev
commands =
    mypy src/fsm_llm/ src/fsm_llm_reasoning/ src/fsm_llm_workflows/ src/fsm_llm_classification/ src/fsm_llm_agents/ src/fsm_llm_monitor/ --ignore-missing-imports
