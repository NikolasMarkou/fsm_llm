[tox]
envlist = py310, py311, py312
isolated_build = True

[testenv]
deps =
    pytest
    pytest-cov
commands =
    pytest {posargs:tests} --cov=fsm_llm

[testenv:lint]
deps =
    flake8
    black
commands =
    flake8 src tests
    black --check src tests

[testenv:type]
deps =
    mypy
commands =
    mypy src/fsm_llm/ --ignore-missing-imports

[testenv:docs]
deps =
    sphinx
    sphinx_rtd_theme
commands =
    sphinx-build -b html docs docs/_build/html

[flake8]
max-line-length = 127
exclude = .tox,*.egg,build,data,__pycache__
select = E,W,F
