[build-system]
requires = ["setuptools>=77.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
version = "0.2.1"
name = "fsm-llm"
description = "Finite State Machines for Large Language Models"
readme = "README.md"
authors = [{name = "Nikolas Markou", email = "nikolas.markou@gmail.com"}]
license = "GPL-3.0-or-later"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
keywords = [
    "llm", "fsm", "finite state machine",
    "large language model", "conversation",
    "ai workflows", "agentic workflows"
]

# Core dependencies (minimal)
dependencies = [
    "loguru>=0.7.3",
    "litellm>=1.68.1",
    "pydantic>=2.0",
    "python-dotenv>=1.1.0",
]

requires-python = ">=3.10"

# Optional extras
[project.optional-dependencies]
core = []  # Empty - core is the default
workflows = [
    # Additional dependencies for workflows
    "networkx>=3.0",          # For workflow graph operations
    "graphviz>=0.20.0",       # For workflow visualization
    "aiofiles>=23.0.0",       # For async file operations
]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "black>=23.0.0",
    "flake8>=6.0.0",
    "mypy>=1.5.0",
]
classification = [
    # No extra deps — uses core litellm + pydantic
]
all = [
    "fsm-llm[workflows]",
    "fsm-llm[classification]",
]

[project.urls]
"Homepage" = "https://github.com/NikolasMarkou/fsm_llm"
"Bug Tracker" = "https://github.com/NikolasMarkou/fsm_llm/issues"

# Core CLI tools (always available)
[project.scripts]
fsm-llm = "fsm_llm.__main__:main_cli"
fsm-llm-visualize = "fsm_llm.visualizer:main_cli"
fsm-llm-validate = "fsm_llm.validator:main_cli"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
fsm_llm = ["py.typed"]
fsm_llm_reasoning = ["py.typed"]
fsm_llm_workflows = ["py.typed"]
fsm_llm_classification = ["py.typed"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
markers = [
    "slow: marks tests as slow",
    "integration: marks integration tests",
    "examples: marks example tests",
    "real_llm: marks tests requiring real LLM API",
]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
